<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>數學棒球王</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; background: #f5f5f5; }
    #scoreboard { display: flex; justify-content: center; gap: 20px; margin: 10px; }
    #field { margin: 20px; font-size: 20px; }
    #questionBox { margin-top: 20px; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    #options button { display: block; margin: 5px auto; }
  </style>
</head>
<body>

<h1>⚾ 數學棒球王</h1>

<div id="scoreboard">
  <div>局數：<span id="inning">1</span></div>
  <div>出局數：<span id="outs">0</span></div>
  <div>比分：攻 <span id="awayScore">0</span> - <span id="homeScore">0</span> 守</div>
</div>

<hr/>

<div id="field">
  🥎 壘包：
  <div id="bases">⚪ ⚪ ⚪</div>
</div>

<hr/>

<div id="questionBox">
  <h3 id="question">點擊開始遊戲</h3>
  <div id="options"></div>
</div>

<button onclick="switchTurn()">🔄 攻守交換</button>

<script>
// ===== 基本狀態 =====
let inning = 1;
let outs = 0;
let awayScore = 0;
let homeScore = 0;

// 簡單題庫（你可以自行擴充）
const questions = [
  { q: "2 + 3 = ?", options: [4,5,6], answer: 5 },
  { q: "6 - 1 = ?", options: [3,5,6], answer: 5 },
  { q: "3 × 2 = ?", options: [5,6,7], answer: 6 }
];

function loadQuestion() {
  const q = questions[Math.floor(Math.random() * questions.length)];
  document.getElementById("question").innerText = q.q;

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = () => checkAnswer(opt, q.answer);
    optionsDiv.appendChild(btn);
  });
}

function checkAnswer(selected, answer) {
  if (selected === answer) {
    alert("安打！");
  } else {
    outs++;
    document.getElementById("outs").innerText = outs;
    alert("出局！");
  }

  if (outs >= 3) {
    alert("換邊！");
    outs = 0;
    inning++;
    document.getElementById("inning").innerText = inning;
  }

  loadQuestion();
}

function switchTurn() {
  alert("攻守交換（功能可再擴充）");
}

loadQuestion();
</script>

</body>
</html>
